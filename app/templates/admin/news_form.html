{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if item else 'Add' }} News - ISIM Admin{% endblock %}
{% block page_title %}{{ 'Edit' if item else 'Add' }} News{% endblock %}
{% block content %}
<div class="card content-card">
    <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">News Title *</label>
                <input type="text" name="title" class="form-control" value="{{ item.title if item else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="5">{{ item.description if item else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Activity Category</label>
                <select name="activity_name" class="form-select">
                    <option value="">Select</option>
                    {% for a in activities %}
                    <option value="{{ a }}" {{ 'selected' if item and item.activity_name == a }}>{{ a }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Images (multiple allowed)</label>
                <input type="file" name="images" class="form-control" multiple accept="image/*">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">PDF / PPT File</label>
                <input type="file" name="pdf" class="form-control" accept=".pdf,.ppt,.pptx">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">{{ 'Update' if item else 'Add' }} News</button>
                <a href="{{ url_for('admin.news_list') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
